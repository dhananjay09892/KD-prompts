name: bridgelens-ci

on:
  push:
    paths:
      - "bridgelens/**"
  pull_request:
    paths:
      - "bridgelens/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridgelens/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./ci.db
          JWT_SECRET: ci-test-secret
        run: python -m pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridgelens/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bridgelens/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
